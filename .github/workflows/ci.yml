name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: npx oxfmt --check src tests
      - run: npx oxlint --tsconfig tsconfig.json src tests
      - run: bunx --bun tsc --noEmit
      - run: bun test
